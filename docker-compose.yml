version: "3.8"

services:
  jenkins1:
    build: ./jenkins
    container_name: jenkins1
    user: "0:0"                                  # docker.sock 접근 위해 root로 실행 (간편 해법)
    ports:
      - "8081:8080"
    environment:
      - JENKINS_OPTS=--httpPort=8080
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml  # JCasC 경로 명시
      - TZ=Asia/Seoul
    volumes:
      - jenkins_home1:/var/jenkins_home
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  jenkins2:
    build: ./jenkins
    container_name: jenkins2
    user: "0:0"
    ports:
      - "8082:8080"
    environment:
      - JENKINS_OPTS=--httpPort=8080
      - CASC_JENKINS_CONFIG=/var/jenkins_home/casc.yaml
      - TZ=Asia/Seoul
    volumes:
      - jenkins_home2:/var/jenkins_home
      - ./jenkins/casc.yaml:/var/jenkins_home/casc.yaml:ro
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  jenkins-lb:
    image: nginx:latest
    container_name: jenkins-lb
    ports:
      - "8080:8080"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - jenkins1
      - jenkins2
    restart: unless-stopped

volumes:
  jenkins_home1:
  jenkins_home2:
