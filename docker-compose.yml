services:
  jenkins1:
    build: ./jenkins
    container_name: jenkins1
    ports: ["8081:8080"]
    environment:
      - JENKINS_OPTS=--httpPort=8080
    volumes:
      - jenkins_home1:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  jenkins2:
    build: ./jenkins
    container_name: jenkins2
    ports: ["8082:8080"]
    environment:
      - JENKINS_OPTS=--httpPort=8080
    volumes:
      - jenkins_home2:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/login || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

  jenkins-lb:
    image: nginx:latest
    container_name: jenkins-lb
    ports: ["8080:8080"]
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - jenkins1
      - jenkins2

volumes:
  jenkins_home1:
  jenkins_home2:
